name: common

# Multi-platform Docker build example:
# https://docs.docker.com/build/ci/github-actions/multi-platform/

on:
  workflow_call:
    inputs:
      publish_docker:
        description: 'Publish Docker images to the registry'
        required: false
        default: false
        type: boolean
      tag_name:
        description: 'Tag to publish'
        required: false
        default: 'latest'
        type: string
      move_latest:
        description: 'Move latest version to the new one'
        required: false
        default: false
        type: boolean
      no_build_cache:
        description: 'Do not use cached docker layers on image build'
        required: false
        default: false
        type: boolean
      platforms:
        description: 'Comma separated list of platforms to be built'
        required: false
        default: 'linux/amd64,linux/arm64'
        type: string
      run_tests:
        description: 'Run tests'
        required: false
        default: false
        type: boolean
      image_name:
        description: 'Fully qualified image name (without tag)'
        required: false
        default: 'singularitynet/omegaclaw'
        type: string
      registry:
        description: 'Container registry to log in to'
        required: false
        default: 'docker.io'
        type: string
    secrets:
      DOCKERHUB_USERNAME:
        required: false
      DOCKERHUB_TOKEN:
        required: false
      REGISTRY_USERNAME:
        required: false
      REGISTRY_PASSWORD:
        required: false
    outputs:
      image:
        description: 'Fully qualified image reference that was built/pushed'
        value: ${{ jobs.common.outputs.image }}

jobs:
  common:
    runs-on: ubuntu-latest
    outputs:
      image: ${{ steps.resolve.outputs.image }}
    steps:
      - name: Resolve image reference
        id: resolve
        run: echo "image=${{ inputs.image_name }}:${{ inputs.tag_name }}" >> "$GITHUB_OUTPUT"

      - name: Login to registry
        if: ${{ inputs.publish_docker }}
        uses: docker/login-action@v4
        with:
          registry: ${{ inputs.registry }}
          username: ${{ secrets.REGISTRY_USERNAME || secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD || secrets.DOCKERHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build image (no push)
        uses: docker/build-push-action@v7
        with:
          platforms: ${{ inputs.platforms }}
          load: ${{ inputs.run_tests }}
          push: false
          tags: ${{ inputs.image_name }}:${{ inputs.tag_name }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          no-cache: ${{ inputs.no_build_cache }}

      - name: Run auto tests
        if: inputs.run_tests
        run: echo "No autotests yet"

      - name: Build and push (release)
        if: success() && inputs.publish_docker
        uses: docker/build-push-action@v7
        with:
          platforms: ${{ inputs.platforms }}
          push: ${{ inputs.publish_docker }}
          tags: |
            ${{ inputs.image_name }}:${{ inputs.tag_name }}
            ${{ inputs.move_latest && format('{0}:latest', inputs.image_name) || '' }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          no-cache: ${{ inputs.no_build_cache }}
