name: Deploy (staging)

on:
  push:
    branches: [telegram]
  workflow_dispatch:

concurrency:
  group: deploy-staging
  cancel-in-progress: false

permissions:
  contents: read
  packages: write

jobs:
  prep:
    runs-on: ubuntu-latest
    outputs:
      image_name: ${{ steps.meta.outputs.image_name }}
      image: ${{ steps.meta.outputs.image }}
      tag: ${{ steps.meta.outputs.tag }}
    steps:
      - name: Resolve image coordinates
        id: meta
        run: |
          owner=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          tag="staging-${{ github.sha }}"
          echo "image_name=ghcr.io/${owner}/omegaclaw" >> "$GITHUB_OUTPUT"
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"
          echo "image=ghcr.io/${owner}/omegaclaw:${tag}" >> "$GITHUB_OUTPUT"

  build:
    needs: prep
    uses: ./.github/workflows/common.yml
    with:
      publish_docker: true
      image_name: ${{ needs.prep.outputs.image_name }}
      registry: ghcr.io
      tag_name: ${{ needs.prep.outputs.tag }}
      platforms: linux/amd64
    secrets:
      REGISTRY_USERNAME: ${{ github.actor }}
      REGISTRY_PASSWORD: ${{ secrets.GITHUB_TOKEN }}

  deploy:
    needs: [prep, build]
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - name: Fetch secrets from Infisical
        uses: Infisical/secrets-action@v1.0.7
        with:
          client-id: ${{ secrets.INFISICAL_CLIENT_ID }}
          client-secret: ${{ secrets.INFISICAL_CLIENT_SECRET }}
          project-slug: ${{ secrets.INFISICAL_PROJECT_SLUG }}
          env-slug: dev

      - name: Deploy to staging server
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          envs: IMAGE,INFISICAL_CLIENT_ID,INFISICAL_CLIENT_SECRET,INFISICAL_PROJECT_ID
          script: |
            set -e
            mkdir -p /omegaclaw
            tee /omegaclaw/.env > /dev/null <<EOF
            INFISICAL_CLIENT_ID=${INFISICAL_CLIENT_ID}
            INFISICAL_CLIENT_SECRET=${INFISICAL_CLIENT_SECRET}
            INFISICAL_PROJECT_ID=${INFISICAL_PROJECT_ID}
            INFISICAL_ENVIRONMENT=staging
            EOF
            chmod 600 /omegaclaw/.env

            mkdir -p /Backup/docker/PeTTa

            docker pull "${IMAGE}"
            docker rm -f omegaclaw 2>/dev/null || true
            docker run -d \
              --name omegaclaw \
              --env-file /omegaclaw/.env \
              -v /Backup/docker/PeTTa:/PeTTa/repos/OmegaClaw-Core/memory \
              "${IMAGE}"
        env:
          IMAGE: ${{ needs.prep.outputs.image }}
          INFISICAL_CLIENT_ID: ${{ secrets.INFISICAL_CLIENT_ID }}
          INFISICAL_CLIENT_SECRET: ${{ secrets.INFISICAL_CLIENT_SECRET }}
          INFISICAL_PROJECT_ID: ${{ secrets.INFISICAL_PROJECT_ID }}
