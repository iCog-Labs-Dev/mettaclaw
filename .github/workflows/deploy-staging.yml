name: Deploy (staging)

on:
  push:
    branches: [telegram]
  workflow_dispatch:

concurrency:
  group: deploy-staging
  cancel-in-progress: false

permissions:
  contents: read
  packages: write

jobs:
  prep:
    runs-on: ubuntu-latest
    outputs:
      image_name: ${{ steps.meta.outputs.image_name }}
      image: ${{ steps.meta.outputs.image }}
      tag: ${{ steps.meta.outputs.tag }}
    steps:
      - name: Resolve image coordinates
        id: meta
        run: |
          owner=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          tag="staging-${{ github.sha }}"
          echo "image_name=ghcr.io/${owner}/omegaclaw" >> "$GITHUB_OUTPUT"
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"
          echo "image=ghcr.io/${owner}/omegaclaw:${tag}" >> "$GITHUB_OUTPUT"

  build:
    needs: prep
    uses: ./.github/workflows/common.yml
    with:
      publish_docker: true
      image_name: ${{ needs.prep.outputs.image_name }}
      registry: ghcr.io
      tag_name: ${{ needs.prep.outputs.tag }}
      platforms: linux/amd64
    secrets:
      REGISTRY_USERNAME: ${{ github.actor }}
      REGISTRY_PASSWORD: ${{ secrets.GITHUB_TOKEN }}

  deploy:
    needs: [prep, build]
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - name: Deploy to staging server
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          envs: IMAGE,ASI_API_KEY,OPENAI_API_KEY,ANTHROPIC_API_KEY,BOT_TOKEN,CHAT_ID
          script: |
            set -e
            mkdir -p /opt/omegaclaw
            cat > /opt/omegaclaw/.env <<EOF
            ASI_API_KEY=${ASI_API_KEY}
            OPENAI_API_KEY=${OPENAI_API_KEY}
            ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
            BOT_TOKEN=${BOT_TOKEN}
            CHAT_ID=${CHAT_ID}
            EOF
            chmod 600 /opt/omegaclaw/.env

            docker pull "${IMAGE}"
            docker rm -f omegaclaw 2>/dev/null || true
            docker run -d \
              --name omegaclaw \
              --restart=always \
              --env-file /opt/omegaclaw/.env \
              "${IMAGE}"
        env:
          IMAGE: ${{ needs.prep.outputs.image }}
          ASI_API_KEY: ${{ secrets.ASI_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
