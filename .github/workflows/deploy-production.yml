name: Deploy (production)

on:
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

permissions:
  contents: read
  packages: write

jobs:
  prep:
    runs-on: ubuntu-latest
    outputs:
      image_name: ${{ steps.meta.outputs.image_name }}
      image: ${{ steps.meta.outputs.image }}
      tag: ${{ steps.meta.outputs.tag }}
    steps:
      - name: Resolve image coordinates
        id: meta
        run: |
          owner=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          tag="production-${{ github.sha }}"
          echo "image_name=ghcr.io/${owner}/omegaclaw" >> "$GITHUB_OUTPUT"
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"
          echo "image=ghcr.io/${owner}/omegaclaw:${tag}" >> "$GITHUB_OUTPUT"

  build:
    needs: prep
    uses: ./.github/workflows/common.yml
    with:
      publish_docker: true
      image_name: ${{ needs.prep.outputs.image_name }}
      registry: ghcr.io
      tag_name: ${{ needs.prep.outputs.tag }}
      platforms: linux/amd64
    secrets:
      REGISTRY_USERNAME: ${{ github.actor }}
      REGISTRY_PASSWORD: ${{ secrets.GITHUB_TOKEN }}

  deploy:
    needs: [prep, build]
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Deploy to production server
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          envs: IMAGE,ASI_API_KEY,OPENAI_API_KEY,ANTHROPIC_API_KEY,BOT_TOKEN,CHAT_ID,LLM_PROVIDER,LLM_MODEL
          script: |
            set -e
            sudo mkdir -p /omegaclaw
            sudo tee /omegaclaw/.env > /dev/null <<EOF
            ASI_API_KEY=${ASI_API_KEY}
            OPENAI_API_KEY=${OPENAI_API_KEY}
            ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
            BOT_TOKEN=${BOT_TOKEN}
            CHAT_ID=${CHAT_ID}
            EOF
            sudo chmod 600 /omegaclaw/.env

            sudo mkdir -p /Backup/docker/PeTTa

            sudo docker pull "${IMAGE}"
            sudo docker rm -f omegaclaw 2>/dev/null || true
            sudo docker run -d \
              --name omegaclaw \
              --restart=always \
              --env-file /omegaclaw/.env \
              -v /Backup/docker/PeTTa:/PeTTa/repos/OmegaClaw-Core/memory \
              "${IMAGE}" \
              commchannel=telegram \
              BOT_TOKEN=${BOT_TOKEN} \
              CHAT_ID=${CHAT_ID} \
              provider=${LLM_PROVIDER} \
              LLM=${LLM_MODEL} \
              embeddingprovider=OpenAI
        env:
          IMAGE: ${{ needs.prep.outputs.image }}
          ASI_API_KEY: ${{ secrets.ASI_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
          LLM_PROVIDER: ${{ vars.LLM_PROVIDER }}
          LLM_MODEL: ${{ vars.LLM_MODEL }}
